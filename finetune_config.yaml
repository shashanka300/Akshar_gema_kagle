# Akshar — Fine-tuning config for Gemma 4 E4B
# Loaded by finetune.py via FinetuneConfig.from_yaml().
# Any key not present on the FinetuneConfig dataclass is logged as "ignored".

# ── Paths ─────────────────────────────────────────────────────────────────────
model_path: "./gemma-4-E4B-it"
data_dir: "./data"
output_dir: "./checkpoints"

# ── LoRA ──────────────────────────────────────────────────────────────────────
# With FastVisionModel we use the higher-level knobs instead of a flat
# target_modules list, so the adapter consistently hits both towers.
lora_r: 32
lora_alpha: 32
lora_dropout: 0.0
finetune_vision_layers: true       # OCR needs the vision tower to adapt
finetune_language_layers: true
finetune_attention_modules: true
finetune_mlp_modules: true

# 4-bit NF4 is handled internally by Unsloth when load_in_4bit=true.
load_in_4bit: true

# ── Training ──────────────────────────────────────────────────────────────────
num_epochs: 3
per_device_train_batch_size: 2     # tuned for 32 GB on RTX 5090 at seq 1024
gradient_accumulation_steps: 16    # effective batch = 32
learning_rate: 2.0e-4
max_seq_length: 1024               # prompt ~30 + image 280 soft tokens + label
warmup_ratio: 0.03
lr_scheduler_type: "cosine"
weight_decay: 0.001

# ── Checkpointing / logging ───────────────────────────────────────────────────
logging_steps: 1
save_steps: 500
save_total_limit: 3
dataloader_num_workers: 0       # >0 deadlocks on Windows with file-seeking datasets

# ── Eval ──────────────────────────────────────────────────────────────────────
eval_steps: 500
eval_batch_size: 2
max_eval_samples: 512              # cap for fast feedback mid-run

# ── Logging backend ───────────────────────────────────────────────────────────
report_to: "wandb"
wandb_entity: "silverhack300"
wandb_project: "akshar-indic-ocr"
wandb_run_name: "gemma4-e4b-qlora"
